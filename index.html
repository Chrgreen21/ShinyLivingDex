<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Living Dex Tracker</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app-shell">
    <main class="dex-area">
      <header class="top-bar">
        <div>
          <h1 id="dexTitle">Shiny Living Dex</h1>
          <p id="dexSubtitle">guest</p>
        </div>

        <div class="controls">
          <button id="settingsBtn" type="button">⚙ Settings</button>
        </div>
      </header>

      <section class="box-card">
        <div class="box-header">
          <nav id="regionTabs" class="region-tabs" aria-label="Region jumps"></nav>
          <span id="caughtCount">0 caught</span>
        </div>

        <div id="boxContainer" class="box-container"></div>
      </section>
    </main>

    <aside class="selected-panel">
      <h2>Selected Pokémon</h2>
      <div id="selectedPanelContent" class="selected-placeholder">
        </div>
    </aside>
  </div>


  <div id="settingsOverlay" class="settings-overlay" hidden>
    <section class="settings-modal" role="dialog" aria-modal="true" aria-labelledby="settingsTitle">
      <div class="settings-modal-header">
        <h2 id="settingsTitle">Settings</h2>
        <button id="closeSettingsBtn" type="button" class="icon-button" aria-label="Close settings">×</button>
      </div>

      
      <div class="account-panel">
        <h3>Account Sync</h3>
        <p id="authStatus" class="auth-status">Not signed in. Your progress is saved only on this device.</p>

        <div id="signedOutControls" class="auth-controls">
          <label class="settings-field">
            <span>Username</span>
            <input id="authUsername" type="text" autocomplete="username" placeholder="Chrgreen21" maxlength="24" />
          </label>

          <label class="settings-field">
            <span>Email</span>
            <input id="authEmail" type="email" autocomplete="email" placeholder="you@example.com" />
          </label>

          <label class="settings-field">
            <span>Password</span>
            <input id="authPassword" type="password" autocomplete="current-password" placeholder="Password" />
          </label>

          <div class="settings-actions">
            <button id="signInBtn" type="button">Sign In</button>
            <button id="signUpBtn" type="button" class="secondary-button">Create Account</button>
            <button id="googleSignInBtn" type="button" class="secondary-button">Sign In With Google</button>
          </div>
        </div>

        <div id="signedInControls" class="auth-controls" hidden>
          <p class="account-username-line">Username: <strong id="accountUsernameText">guest</strong></p>
          <label class="settings-field">
            <span>Change username</span>
            <input id="settingsUsername" type="text" autocomplete="username" placeholder="Chrgreen21" maxlength="24" />
          </label>
          <div class="settings-actions">
            <button id="saveUsernameBtn" type="button">Save Username</button>
            <button id="syncSaveBtn" type="button">Sync Save</button>
            <button id="loadCloudSaveBtn" type="button" class="secondary-button">Load Cloud Save</button>
            <button id="signOutBtn" type="button" class="secondary-button">Sign Out</button>
          </div>
        </div>

        <p id="authMessage" class="auth-message"></p>
      </div>

      <label class="settings-field">
        <span>Dex title</span>
        <input id="settingsDexTitle" type="text" maxlength="40" value="Shiny Living Dex" />
      </label>

      <div class="settings-actions">
        <button id="saveSettingsBtn" type="button">Save Settings</button>
        <button id="resetSettingsBtn" type="button" class="secondary-button">Reset Text</button>
      </div>

      <div class="settings-danger-zone">
        <h3>Save Data</h3>
        <p>This clears only the caught/uncaught save stored in this browser.</p>
        <button id="exportCsvBtn" type="button" class="secondary-button">Export CSV</button>
        <label class="csv-import-label">
          Import CSV
          <input id="importCsvInput" type="file" accept=".csv,text/csv" />
        </label>
        <button id="clearSaveBtn" type="button" class="danger-button">Clear Caught Save</button>
        <button id="deleteAccountBtn" type="button" class="danger-button">Delete Account</button>
      </div>
    </section>
  </div>

<button id="scrollTopButton" title="Back to Box 1">↑</button>


  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="supabase-config.js"></script>
  <script src="app.js"></script>

</body>
</html>
