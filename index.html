<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Living Dex Tracker</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app-shell">
    <main class="dex-area">
      <header class="top-bar">
        <div>
          <div class="dex-title-block">
            <h1 id="dexNameDisplay">Dex Name</h1>
            <p id="dexUsernameDisplay">u:Chrgreen21</p>
        </div>
        </div>

        <div class="controls">
          <button id="clearSaveBtn">Clear Caught Save</button>
        <button id="settingsButton" class="settings-button" type="button">Settings</button>
        </div>
      </header>

      <section class="box-card">
        <div class="box-header">
          <nav id="regionTabs" class="region-tabs" aria-label="Region jumps"></nav>
          <span id="caughtCount">0 caught</span>
        </div>

        <div id="boxContainer" class="box-container"></div>
      </section>
    </main>

    <aside class="selected-panel">
      <h2>Selected Pokémon</h2>
      <div id="selectedPanelContent" class="selected-placeholder">
        Hover a Pokémon to preview it. Click once to mark caught or uncaught.
      </div>
    </aside>
  </div>

  <script src="app.js"></script>

<button id="scrollTopButton" title="Back to Box 1">↑</button>


<div id="settingsModal" class="settings-modal" hidden>
    <div class="settings-card">
        <div class="settings-card-header">
            <h2>Settings</h2>
            <button id="closeSettingsButton" type="button" aria-label="Close settings">×</button>
        </div>

        <label for="dexNameInput">Dex Name</label>
        <input id="dexNameInput" type="text" placeholder="Dex Name">

        <label for="dexUsernameInput">Username</label>
        <input id="dexUsernameInput" type="text" placeholder="u:Chrgreen21">

        <div class="settings-actions">
            <button id="saveSettingsButton" type="button">Save</button>
            <button id="resetSettingsButton" type="button">Reset</button>
        </div>
    </div>
</div>

</body>
</html>
